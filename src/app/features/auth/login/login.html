<div class="page">
  <mat-card class="card">
    <h2>Login</h2>

    <form [formGroup]="loginForm" (ngSubmit)="onLogin()">

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Username</mat-label>
        <input matInput formControlName="username">
      </mat-form-field>

      <mat-form-field appearance="outline" class="full-width">
        <mat-label>Password</mat-label>
        <input matInput [type]="hidePassword() ? 'password' : 'text'" formControlName="password">
        <button mat-icon-button matSuffix type="button" (click)="togglePassword()">
          <mat-icon>{{ hidePassword() ? 'visibility' : 'visibility_off' }}</mat-icon>
        </button>
      </mat-form-field>

      <button mat-raised-button color="primary" class="full-width" [disabled]="loginForm.invalid">
        Login
      </button>

    </form>

    <p *ngIf="error" class="error">Invalid credentials</p>

    <div class="footer">
      <span>Don't have an account?</span>
      <a (click)="goToRegister()">Register</a>
    </div>

  </mat-card>

</div>
